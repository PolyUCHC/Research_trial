                <text x={12} y={yLane + laneH / 2 + 14} fontSize={9.5} fill={MUTE} dominantBaseline="middle">
                  {SHORT[c].split(" ").slice(1).join(" ")}
                </text>
                {DATA.formation[c].map((sg, j) => {
                  const x0 = x(sg.start), x1 = x(sg.end + 1);
                  const solid = sg.stage === "indep";
                  const hatch = sg.stage === "combined";
                  const stub = sg.stage === "unknown";
                  const within = sg.stage === "within";
                  return (
                    <g key={j}>
                      <rect
                        x={x0} y={yLane + 8} width={Math.max(x1 - x0, 3)} height={laneH - 18}
                        rx={3}
                        fill={stub ? "none" : hatch ? `url(#h-${i})` : (solid || within) ? color : PANEL2}

                      </text>
                    </g>
                  );
                })}
                <defs>
                  <pattern id={`h-${i}`} width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                    <rect width="6" height="6" fill={PANEL} />
                    <line x1="0" y1="0" x2="0" y2="6" stroke={color} strokeWidth="2.4" />
                  </pattern>
                </defs>
              </g>
            );
          })}
        </svg>
      </div>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginTop: 8, fontSize: 11.5, color: INK }}>
        {Object.entries(STAGE_LABEL).map(([k, v]) => (
          <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
            <span style={{
              width: 22, height: 12, borderRadius: 2, display: "inline-block",
              background: k === "indep" ? INK : k === "combined" ? "repeating-linear-gradient(45deg," + PANEL + "," + PANEL + "2px," + INK + "2px," + INK + "4px)" : k === "unknown" ? "none" : k === "within" ? "rgba(46,90,123,.16)" : PANEL2,
              border: k === "unknown" ? `1px dashed ${MUTE}` : k === "within" ? "1px solid #2E5A7B" : `1px solid ${LINE}`,
            }} />
            {v}
          </span>
        ))}
      </div>
    </div>
  );
}

function TrainingBars({ sel, setSel }) {
  const regions = ["cn", "west", "hk", "tw", "jp"];

  const rows = insts.map(c => {
    const persons = {};
    DATA.faculty.filter(f => f.c === c).forEach(f => { const k = f.zh || f.en; if (!(k in persons)) persons[k] = (f.reg && f.reg.length) ? f.reg[0] : "none"; });
    const counts = {}; const vals = Object.values(persons);
    vals.forEach(r => counts[r] = (counts[r] || 0) + 1);
    return { c, counts, n: vals.length };
  });
  return (
    <div style={{ marginTop: 26 }}>

            <div style={{ flex: 1, height: 16, display: "flex", borderRadius: 3, overflow: "hidden", background: "#00000006" }}>
              {regions.map(rg => r.counts[rg] ? <div key={rg} title={`${REGION[rg].l}: ${r.counts[rg]}`} style={{ width: `${100 * r.counts[rg] / r.n}%`, background: REGION[rg].c, opacity: sel && sel !== rg ? 0.16 : 1 }} /> : null)}
              {r.counts["none"] ? <div title={`未明 unclassified: ${r.counts["none"]}`} style={{ width: `${100 * r.counts["none"] / r.n}%`, background: "#cfc8b8", opacity: sel ? 0.3 : 1 }} /> : null}
            </div>
            <span className="mono" style={{ width: 26, fontSize: 10.5, color: MUTE }}>{r.n}</span>

        ))}
      </div>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 8, fontSize: 11, alignItems: "center" }}>

      </div>
    </div>
  );
}

function Ucc() {
  const D = DATA.ucc, L = 40, top = 12, mh = 76, bw = 26, gap = 8, W = L + D.length * (bw + gap) + 10;
  const mx = Math.max(...D.map(d => d[1] || 0));
  return (
    <div style={{ marginTop: 16 }}>
      <div className="eyebrow">聯合書院每年歷史課程數 United — history courses offered per year · dashed = 史地系→歷史系 rename</div>
      <div style={{ overflowX: "auto", marginTop: 6 }}>
        <svg viewBox={`0 0 ${W} ${top + mh + 30}`} style={{ minWidth: W, fontFamily: "ui-monospace,monospace" }}>
          {D.map((d, i) => {
            const x = L + i * (bw + gap);
            if (d[1] == null) return <text key={i} x={x + bw / 2} y={top + mh - 4} fontSize="8" fill="#c9c2b2" textAnchor="middle">n/a</text>;
            const bh = d[1] / mx * mh, indep = d[2] === "歷史系";

              <g key={i}>
                <rect x={x} y={top + mh - bh} width={bw} height={bh} rx={2} fill={indep ? "#B0843A" : "#caa86a"}><title>{d[0]}: {d[1]} ({d[2]})</title></rect>
                <text x={x + bw / 2} y={top + mh - bh - 3} fontSize="9" fill={INK} textAnchor="middle">{d[1]}</text>
                <text x={x + bw / 2} y={top + mh + 11} fontSize="7.5" fill={MUTE} textAnchor="middle" transform={`rotate(-40 ${x + bw / 2} ${top + mh + 11})`}>{d[0]}</text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

                {cols.map(col => {
                  const cl = cell(col, lvl);
                  const list = cl ? cl.courses : [];
                  return (
                    <td key={col} style={td}>
                      {list.length === 0 && <span style={{ fontSize: 11, color: MUTE }}>—</span>}
                      {(() => { let last = null; return list.map((cr, i) => {
                        const sec = cr.section && cr.section !== last ? cr.section : null; last = cr.section;
                        return (
                          <div key={i}>
                            {sec && <div className="mono" style={{ fontSize: 9.5, color: MUTE, marginTop: i ? 6 : 0, letterSpacing: 0.4, textTransform: "uppercase" }}>{sec}</div>}
                            <div style={{ fontSize: 12, lineHeight: 1.45, padding: "1px 4px", borderRadius: 3, margin: "1px 0",
                              background: cr.is_cn_survey ? "#AE412714" : match(cr.name) ? "#0000000d" : "transparent",
                              borderLeft: cr.is_cn_survey ? `2px solid ${SEAL}` : "2px solid transparent",
                              color: cr.is_cn_survey ? SEAL : INK, fontWeight: cr.is_cn_survey ? 600 : 400 }}>
                              {cr.name}
                              <span className="mono" style={{ fontSize: 9.5, color: cr.is_cn_survey ? SEAL : MUTE, marginLeft: 4 }}>（{cr.credit}）</span>
                            </div>
                          </div>
                        );
                      }); })()}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Curriculum() {
  const [view, setView] = useState("table");
  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <button onClick={() => setView("table")} className={"chip" + (view === "table" ? " on" : "")}>課程表 Course table</button>
        <button onClick={() => setView("compare")} className={"chip" + (view === "compare" ? " on" : "")}>四年比較 Compare 4-year</button>
      </div>
      <div style={{ background: PANEL2, border: `1px solid ${LINE}`, borderRadius: 6, padding: "8px 12px", fontSize: 11.5, color: "#4a4438", marginBottom: 14, lineHeight: 1.5 }}>
        <b style={{ color: SEAL }}>中國通史 / General Chinese History</b> (highlighted) opens Year 1 at every college — including <b>HKU</b>, whose Department of Chinese ran a three-year Chinese-History strand (B) alongside Language &amp; Literature, Translation and Philosophy. Units aren\u2019t comparable — 新亞 credits · 聯合 weekly periods · 崇基 credits · 港大 lectures/week. Kept as in source.
      </div>
      {view === "table" ? <CourseTable /> : <Compare />}
    </div>
  );
}

/* ---------------- Sources & coverage ---------------- */
function Sources() {
  const years = DATA.years;
  const insts = FAC;
  const SRC = [
    { f: "United_College_HK_Calendar 1961–75 (select)", cov: "聯合 United：教員＋課程", note: "缺 1962–63、1964–65 頁" },
    { f: "Chung_Chi_College_Bulletin 1956–69 / 1970–75", cov: "崇基 Chung Chi：教員＋課程", note: "缺 1956–57、1958–59→1963–64 頁" },
    { f: "新亞draft22.6.26.xlsx（NA-tagged rows）", cov: "新亞 New Asia：教員 1950–76 + 課程 + 學生數", note: "草稿，待核《新亞書院概況》" },
    { f: "新亞draft22.6.26.xlsx（BC-tagged rows）＋《香港浸會學院同學錄》1963/64", cov: "浸會 Baptist：歷史學系（1960 創立）；歷史科教員 1963–65", note: "同學錄為主，僅錄文學院歷史科教員" },
    { f: "HKU Calendar 1961–62（中文系名單）", cov: "港大 HKU：中文系教員 6 人（Drake、羅香林、饒宗頤等），1961–62", note: "中文系開設中國歷史；無獨立歷史系" },
    { f: "三間書院歷史課程比較表 + typed course list", cov: "87 門課程（三書院＋HKU 註記）", note: "已移除無來源之 CUHK 1970s 課程" },
  ];
  return (
    <div>
      <div className="eyebrow">資料覆蓋 Coverage — three colleges with annual rosters</div>
      <div style={{ overflowX: "auto", marginTop: 8 }}>
        <div style={{ display: "grid", gridTemplateColumns: `92px repeat(${years.length}, 1fr)`, minWidth: 760, gap: 1 }}>
          <div />
          {years.map(y => <div key={y} className="mono" style={{ fontSize: 8, color: MUTE, textAlign: "center", writingMode: "vertical-rl", height: 30, justifySelf: "center" }}>{y}</div>)}
          {insts.map(c => (
            <React.Fragment key={c}>
              <div style={{ fontSize: 11, color: COL[c], fontWeight: 600, alignSelf: "center", paddingRight: 4 }}>{SHORT[c].split(" ")[0]}</div>
              {years.map(y => {
                const doc = documented(c, y), n = doc ? recs(c, y).length : 0, draft = c.includes("New Asia");
                return <div key={y} title={`${c} ${y}: ${doc ? n + " 人記錄" : "無來源頁"}`} style={{
                  height: 18, borderRadius: 1,
                  background: !doc ? "#00000008" : draft ? `repeating-linear-gradient(45deg,${COL[c]},${COL[c]} 2px,#ffffff80 2px,#ffffff80 4px)` : COL[c],
                  border: doc ? "none" : `1px dashed ${LINE}`,
                }} />;
              })}
            </React.Fragment>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", gap: 18, fontSize: 11.5, marginTop: 8, color: INK, flexWrap: "wrap" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 16, height: 12, background: INK, borderRadius: 2 }} />有來源頁 documented</span>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 16, height: 12, borderRadius: 2, background: `repeating-linear-gradient(45deg,${INK},${INK} 2px,#ffffff80 2px,#ffffff80 4px)` }} />草稿待核 draft</span>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span style={{ width: 16, height: 12, background: "#00000008", border: `1px dashed ${LINE}`, borderRadius: 2 }} />無來源頁 no source (≠ empty dept)</span>
      </div>
      <div className="eyebrow" style={{ marginTop: 24 }}>來源文件 Source documents</div>
      <table style={{ borderCollapse: "collapse", width: "100%", marginTop: 8, fontSize: 12.5 }}>
        <tbody>
          {SRC.map((s, i) => (
            <tr key={i} style={{ borderBottom: `1px solid ${LINE}` }}>
              <td className="mono" style={{ padding: "8px 10px 8px 0", color: INK, verticalAlign: "top", width: "36%", fontSize: 11.5 }}>{s.f}</td>
              <td style={{ padding: "8px 10px", color: "#4a4438", verticalAlign: "top" }}>{s.cov}</td>
              <td style={{ padding: "8px 0", color: MUTE, verticalAlign: "top", width: "24%" }}>{s.note}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <p style={{ fontSize: 11.5, color: MUTE, marginTop: 14, lineHeight: 1.6, maxWidth: 770 }}>
        Integrity note — names, ranks, and courses are transcribed from the files above; nothing is inferred from outside them. Empty cells mean the source page is absent, never that a department had no staff. New Asia is a working draft pending check against 《新亞書院概況》. Baptist's History & Geography department (founded 1960) is documented for 1963–65 from the student directories. HKU's Department of Chinese (founded 1927) is listed with its 1961–62 staff from the Calendar; the university had no separate History department.
      </p>
    </div>
  );
}

const thLeft = { textAlign: "left", padding: "6px 10px 6px 0", verticalAlign: "top", borderBottom: `2px solid ${INK}`, width: 70 };
const thCol = { padding: "8px 10px", fontSize: 12.5, fontWeight: 600, textAlign: "left", borderRadius: "4px 4px 0 0" };
const td = { padding: "8px 10px", verticalAlign: "top", borderBottom: `1px solid ${LINE}`, borderLeft: `1px solid ${LINE}` };

function App() {
  const [tab, setTab] = useState("formation");
  const persons = useMemo(() => new Set(DATA.faculty.map(f => f.c + "|" + (f.zh || f.en))).size, []);
  const tabs = [["formation", "形成", "Formation"], ["faculty", "教員", "Faculty"], ["curriculum", "課程", "Curriculum"], ["sources", "來源", "Sources"]];
  return (
    <div style={{ background: PAPER, minHeight: "100vh", color: INK, fontFamily: "system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" }}>
      <style>{`
        .mono{font-family:ui-monospace,'SF Mono',Menlo,monospace}
        .serif{font-family:Georgia,'Songti SC','Source Han Serif',serif}
        .eyebrow{font-family:ui-monospace,monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:${MUTE};border-bottom:1px solid ${LINE};padding-bottom:4px}
        .ybtn{background:${PANEL};border:1px solid ${LINE};border-radius:5px;color:${INK};width:30px;height:28px;cursor:pointer;font-size:12px}
        .ybtn:hover{background:${PANEL2}}
        .chip{background:${PANEL};border:1px solid ${LINE};border-radius:6px;color:${MUTE};padding:6px 12px;cursor:pointer;font-size:12.5px}
        .chip.on{background:${INK};color:#fff;border-color:${INK}}
        .tab{background:none;border:none;cursor:pointer;padding:10px 4px;color:${MUTE};font-size:14px;border-bottom:2px solid transparent;display:flex;gap:7px;align-items:baseline}
        .tab.active{color:${INK};border-bottom-color:${SEAL}}
        .tab:hover{color:${INK}}
        input[type=range]{height:4px}
        table{font-family:inherit}
      `}</style>
      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "26px 22px 60px" }}>
        <div style={{ borderBottom: `2px solid ${INK}`, paddingBottom: 16 }}>
          <div className="mono" style={{ fontSize: 10.5, letterSpacing: 2, color: SEAL, textTransform: "uppercase" }}>香港戰後高等教育 · 歷史學科的形成</div>
          <h1 className="serif" style={{ fontSize: 27, margin: "6px 0 2px", color: INK, fontWeight: 700, lineHeight: 1.15 }}>The Making of a Discipline</h1>
          <p className="serif" style={{ fontSize: 14, color: "#4a4438", margin: 0, fontStyle: "italic" }}>History faculty &amp; curriculum in post-war Hong Kong higher education, 1950–1976</p>
          <div style={{ display: "flex", gap: 30, marginTop: 16, flexWrap: "wrap" }}>
            <Stat n={DATA.faculty.length} label="教員年度紀錄 staff-year records" />
            <Stat n={persons} label="可辨識教員 distinct teachers" />
            <Stat n={DATA.courses.length} label="課程條目 course entries" />
            <Stat n="5" label="院校 institutions in scope" />
          </div>
        </div>
        <div style={{ display: "flex", gap: 26, borderBottom: `1px solid ${LINE}`, marginBottom: 22 }}>
          {tabs.map(([k, zh, en]) => (
            <button key={k} className={"tab" + (tab === k ? " active" : "")} onClick={() => setTab(k)}>
              <span style={{ fontWeight: 600 }}>{zh}</span><span className="mono" style={{ fontSize: 11 }}>{en}</span>
            </button>
          ))}
        </div>
        {tab === "formation" && <Formation />}
        {tab === "faculty" && <Faculty />}
        {tab === "curriculum" && <Curriculum />}
        {tab === "sources" && <Sources />}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
